<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
font-family:Arial;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.card{
background:#1e293b;
padding:40px;
border-radius:10px;
width:300px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:none;
}

button{
width:100%;
padding:10px;
background:#3b82f6;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

#error{
color:red;
margin-top:10px;
}
</style>

</head>

<body>

<div class="card">

<h2>System Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div id="error"></div>

</div>

<script>

function login(){

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

fetch('/login',{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({
email:email,
password:password
})
})
.then(res=>{

if(!res.ok){
throw new Error("Login failed");
}

return res.json();

})

.then(data=>{

localStorage.setItem("userId", data.user.user_id || data.user_id);

window.location="dashboard.html";

})
.catch(err=>{
document.getElementById("error").innerText="Invalid login";
});

}

</script>

</body>
</html>
